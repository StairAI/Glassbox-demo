[pytest]
# Pytest configuration for Glass Box Protocol

# Disable problematic plugins
addopts = -p no:hydra

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
console_output_style = progress

# Verbosity
# -v for verbose, -vv for extra verbose
# Can override with pytest -v or pytest -vv

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test paths
testpaths = tests

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    llm: marks tests that require LLM API access
    blockchain: marks tests that require blockchain access
