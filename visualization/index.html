<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Box Explorer - SUI Testnet</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toast-container"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>🔍 Glass Box Explorer</h1>
                <p class="subtitle">Real-time Agent Transparency on SUI Testnet</p>
            </div>
            <div class="network-status">
                <span class="status-indicator" id="network-status">●</span>
                <span id="network-label">SUI Testnet</span>
            </div>
        </header>

        <!-- Tab Navigation -->
        <nav class="tabs">
            <button class="tab-button active" data-tab="triggers">
                📊 Triggers
            </button>
            <button class="tab-button" data-tab="agents">
                🤖 Agents
            </button>
        </nav>

        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Triggers Tab -->
            <div id="triggers" class="tab-panel active">
                <div class="panel-header">
                    <h2>Triggers</h2>
                    <button class="refresh-btn" onclick="refreshTriggers()">
                        🔄 Refresh
                    </button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Triggers</div>
                        <div class="stat-value" id="total-triggers">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">News Triggers</div>
                        <div class="stat-value" id="news-triggers">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Signal Triggers</div>
                        <div class="stat-value" id="signal-triggers">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Latest Update</div>
                        <div class="stat-value" id="latest-update">-</div>
                    </div>
                </div>

                <div class="data-section">
                    <h3>Recent Triggers from SUI Network</h3>
                    <div class="filter-bar">
                        <select id="owner-filter">
                            <!-- Populated dynamically from API -->
                        </select>
                        <select id="trigger-type-filter">
                            <option value="all">All Types</option>
                            <option value="news">News Triggers</option>
                            <option value="signal">Signal Triggers</option>
                        </select>
                        <input type="text" id="search-box" placeholder="Search by ID, token, or producer...">
                    </div>
                    <div id="triggers-list" class="triggers-list">
                        <div class="loading">Loading triggers from SUI...</div>
                    </div>
                </div>
            </div>

            <!-- Agents Tab -->
            <div id="agents" class="tab-panel">
                <div class="panel-header">
                    <h2>Agent Registry</h2>
                    <button class="refresh-btn" onclick="refreshAgents()">
                        🔄 Refresh
                    </button>
                </div>

                <div class="agents-grid" id="agents-grid">
                    <div class="loading">Loading agents...</div>
                </div>

                <!-- Agent Detail Modal -->
                <div id="agent-detail-modal" class="modal">
                    <div class="modal-content">
                        <span class="close-btn" onclick="closeAgentDetail()">&times;</span>
                        <div id="agent-detail-content">
                            <!-- Dynamic content loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/main.js"></script>
</body>
</html>
